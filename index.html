<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#6366f1">
<link rel="manifest" href="manifest.json">
<title>IA Photo Renamer</title>
<style>
*{margin:0;padding:0}body{font-family:sans-serif;background:#0f0f1a;color:#fff;padding:16px}
h1{background:linear-gradient(45deg,#6366f1,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;font-size:2em;margin:20px 0}
.zone{border:3px dashed #6366f1;border-radius:20px;padding:50px 20px;text-align:center;margin:16px 0;cursor:pointer}
.zone:active{background:rgba(99,102,241,.1)}
.btn{background:linear-gradient(45deg,#6366f1,#a855f7);color:#fff;border:none;padding:18px;border-radius:50px;font-size:1.1em;width:100%;margin:10px 0;font-weight:bold}
.btn:disabled{opacity:.5}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:16px 0}
.card{background:#1a1a2e;border-radius:12px;overflow:hidden}
.card img{width:100%;height:100px;object-fit:cover}
.info{padding:8px;font-size:.7em}
.old{color:#ef4444;text-decoration:line-through}.new{color:#22c55e;font-weight:bold}
.loading{display:none;text-align:center;padding:20px}
.spinner{border:3px solid #1a1a2e;border-top:3px solid #6366f1;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:20px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#22c55e;padding:12px 24px;border-radius:50px;display:none;font-weight:bold}
</style>
</head>
<body>
<h1>🪄 IA Photo Renamer</h1>
<div class="zone" onclick="document.getElementById('f').click()">
<div style="font-size:3em">📸</div><p>Appuyez pour sélectionner</p>
<input type="file" id="f" multiple accept="image/*" style="display:none" onchange="add(this.files)">
</div>
<div class="grid" id="g"></div>
<button class="btn" id="btn" disabled onclick="analyze()">🤖 Analyser avec l'IA</button>
<div class="loading" id="load"><div class="spinner"></div><p id="lt">Analyse IA...</p></div>
<div class="toast" id="toast"></div>
<script type="module">
import{pipeline}from'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
import JSZip from'https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm';
window.imgs=[];window.model=null;
window.add=function(f){window.imgs=[...window.imgs,...f].filter(x=>x.type.startsWith('image/'));document.getElementById('g').innerHTML=window.imgs.map((x,i)=>'<div class="card"><img src="'+URL.createObjectURL(x)+'"><div class="info"><div class="old">'+x.name+'</div><div class="new" id="n'+i+'"></div></div></div>').join('');document.getElementById('btn').disabled=!window.imgs.length};
window.analyze=async function(){
try{
if(!window.model){document.getElementById('load').style.display='block';document.getElementById('lt').textContent='Chargement IA...';window.model=await pipeline('image-classification','Xenova/vit-base-patch16-224',{quantized:true})}
document.getElementById('load').style.display='block';document.getElementById('lt').textContent='Analyse...';
const zip=new JSZip();
for(let i=0;i<window.imgs.length;i++){let f=window.imgs[i];let url=URL.createObjectURL(f);let res=await window.model(url);URL.revokeObjectURL(url);let label=res[0].label.replace(/[,\s]+/g,'_').toLowerCase();let ext=f.name.split('.').pop();document.getElementById('n'+i).textContent='→ '+label+'.'+ext;let buf=await f.arrayBuffer();zip.file(label+'.'+ext,buf)}
const blob=await zip.generateAsync({type:'blob'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='photos_renommees.zip';document.body.appendChild(a);a.click();document.body.removeChild(a);
document.getElementById('load').style.display='none';let t=document.getElementById('toast');t.textContent='✅ Terminé !';t.style.display='block';setTimeout(()=>t.style.display='none',3000)
}catch(e){document.getElementById('load').style.display='none';document.getElementById('toast').textContent='❌ Erreur: '+e.message;document.getElementById('toast').style.display='block';document.getElementById('toast').style.background='#ef4444';setTimeout(()=>{document.getElementById('toast').style.display='none';document.getElementById('toast').style.background='#22c55e'},10000)}
};
</script>
</body></html>
